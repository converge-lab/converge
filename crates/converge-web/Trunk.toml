# Dev loop: `trunk serve --features api` + a locally running converge-server
# on its default listen address. The proxy keeps the app same-origin in dev,
# exactly like production (where the server binary serves these assets
# itself) — no CORS, no baked-in URLs. The dev server sits on 8081 so it
# can't collide with the API server's default 8080.
[serve]
port = 8081

[[proxy]]
backend = "http://127.0.0.1:8080/api"
