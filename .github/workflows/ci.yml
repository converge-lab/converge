name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

env:
  # Compile against the committed .sqlx cache; never reach for a live DB.
  # The `sqlx` job is the one place the cache itself is verified.
  SQLX_OFFLINE: "true"

jobs:
  check:
    # `cargo check` on MSRV and stable first — the pushed code at least compiles.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: ["1.88", stable]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --workspace --all-features --bins --tests --benches

  test:
    # Integration tests boot Postgres via testcontainers (Docker is
    # preinstalled on ubuntu runners).
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace --all-features

  sqlx:
    # A stale query cache compiles fine offline but lies about the schema —
    # regenerate against a fresh Postgres and fail on any drift.
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli
      - name: Verify committed .sqlx is current
        run: cargo xtask prepare --check
        env:
          SQLX_OFFLINE: "false"

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-features --bins --examples --tests --benches -- -D warnings

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Documentation
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
